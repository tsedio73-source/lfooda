<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LfooDa</title>
    <link rel="stylesheet" href="dist/css/grapes.min.css" />
    <script src="grapes.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
      }
    </style>
    <script>
(async () => {
    try {

        const response = await fetch("./maintenance.json?t=" + Date.now());
        const config = await response.json();

        if (!config.maintenance) return;

        document.body.innerHTML = `
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f172a;
font-family:Inter,Arial,sans-serif;
color:#fff;
overflow:hidden;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#2563eb33,transparent 45%),
radial-gradient(circle at bottom,#9333ea33,transparent 45%),
#0f172a;
}

.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:min(92%,700px);
padding:50px;
border-radius:24px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.12);
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.4);
}

.logo{
font-size:65px;
margin-bottom:15px;
}

h1{
font-size:40px;
margin-bottom:12px;
}

p{
font-size:18px;
color:#cbd5e1;
line-height:1.7;
}

.timer{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin:40px 0;
}

.box{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:16px;
}

.value{
font-size:34px;
font-weight:bold;
}

.label{
margin-top:6px;
font-size:13px;
color:#94a3b8;
letter-spacing:1px;
}

button{
margin-top:20px;
padding:14px 34px;
font-size:16px;
background:#2563eb;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.footer{
margin-top:35px;
font-size:14px;
color:#94a3b8;
}

@media(max-width:650px){

.timer{
grid-template-columns:repeat(2,1fr);
}

h1{
font-size:30px;
}

}

</style>

<div class="bg"></div>

<div class="card">

<div class="logo">🚧</div>

<h1>${config.title}</h1>

<p>${config.message}</p>

<div class="timer">

<div class="box">
<div id="days" class="value">00</div>
<div class="label">DAYS</div>
</div>

<div class="box">
<div id="hours" class="value">00</div>
<div class="label">HOURS</div>
</div>

<div class="box">
<div id="minutes" class="value">00</div>
<div class="label">MINUTES</div>
</div>

<div class="box">
<div id="seconds" class="value">00</div>
<div class="label">SECONDS</div>
</div>

</div>

<button onclick="location.reload()">
${config.buttonText}
</button>

<div class="footer">
LFOODA • Thank you for your patience ❤️
</div>

</div>
`;

        function updateCountdown(){

            const end=new Date(config.endTime).getTime();
            const now=Date.now();
            const diff=end-now;
          if (diff <= 0) {

    fetch("./maintenance.json?t=" + Date.now())
      .then(r => r.json())
      .then(data => {

          if (data.maintenance) {
              location.reload();
          } else {
              location.href = "/";
          }

      });

    return;
}

        updateCountdown();

        setInterval(updateCountdown,1000);

    } catch(e){
        console.error(e);
    }
})();
</script>
  </head>
  <body>

    <div id="gjs" style="height: 0px; overflow: hidden">
      <div class="panel">
        <h1 class="welcome">Welcome to</h1>
        <div class="big-title">
          <svg class="logo" viewBox="0 0 100 100">
            <path
              d="M40 5l-12.9 7.4 -12.9 7.4c-1.4 0.8-2.7 2.3-3.7 3.9 -0.9 1.6-1.5 3.5-1.5 5.1v14.9 14.9c0 1.7 0.6 3.5 1.5 5.1 0.9 1.6 2.2 3.1 3.7 3.9l12.9 7.4 12.9 7.4c1.4 0.8 3.3 1.2 5.2 1.2 1.9 0 3.8-0.4 5.2-1.2l12.9-7.4 12.9-7.4c1.4-0.8 2.7-2.2 3.7-3.9 0.9-1.6 1.5-3.5 1.5-5.1v-14.9 -12.7c0-4.6-3.8-6-6.8-4.2l-28 16.2"
            />
          </svg>
          <span>LfooDa</span>
        </div>
        <div class="description">
          This is a demo content from index.html. For the development, you shouldn't edit this file, instead you can
          copy and rename it to _index.html, on next server start the new file will be served, and it will be ignored by
          git.
        </div>
      </div>
      <style>
        .panel {
          width: 90%;
          max-width: 700px;
          border-radius: 3px;
          padding: 30px 20px;
          margin: 150px auto 0px;
          background-color: #d983a6;
          box-shadow: 0px 3px 10px 0px rgba(0, 0, 0, 0.25);
          color: rgba(255, 255, 255, 0.75);
          font: caption;
          font-weight: 100;
        }

        .welcome {
          text-align: center;
          font-weight: 100;
          margin: 0px;
        }

        .logo {
          width: 70px;
          height: 70px;
          vertical-align: middle;
        }

        .logo path {
          pointer-events: none;
          fill: none;
          stroke-linecap: round;
          stroke-width: 7;
          stroke: #fff;
        }

        .big-title {
          text-align: center;
          font-size: 3.5rem;
          margin: 15px 0;
        }

        .description {
          text-align: justify;
          font-size: 1rem;
          line-height: 1.5rem;
        }
      </style>
    </div>

    <script type="text/javascript">
      var editor = grapesjs.init({
        showOffsets: 1,
        noticeOnUnload: 0,
        container: '#gjs',
        height: '100%',
        fromElement: true,
        storageManager: { autoload: 0 },
        styleManager: {
          sectors: [
            {
              name: 'General',
              open: false,
              buildProps: ['float', 'display', 'position', 'top', 'right', 'left', 'bottom'],
            },
            {
              name: 'Flex',
              open: false,
              buildProps: [
                'flex-direction',
                'flex-wrap',
                'justify-content',
                'align-items',
                'align-content',
                'order',
                'flex-basis',
                'flex-grow',
                'flex-shrink',
                'align-self',
              ],
            },
            {
              name: 'Dimension',
              open: false,
              buildProps: ['width', 'height', 'max-width', 'min-height', 'margin', 'padding'],
            },
            {
              name: 'Typography',
              open: false,
              buildProps: [
                'font-family',
                'font-size',
                'font-weight',
                'letter-spacing',
                'color',
                'line-height',
                'text-shadow',
              ],
            },
            {
              name: 'Decorations',
              open: false,
              buildProps: [
                'border-radius-c',
                'background-color',
                'border-radius',
                'border',
                'box-shadow',
                'background',
              ],
            },
            {
              name: 'Extra',
              open: false,
              buildProps: ['transition', 'perspective', 'transform'],
            },
          ],
        },
      });

      editor.Panels.addButton('options', {
  id: 'download-files',
  className: 'fa fa-download',
  command: 'download-files',
  attributes: {
    title: 'Download Files',
  },
});

editor.Commands.add('download-files', {
  run(editor) {
    const html = editor.getHtml();
    const css = editor.getCss();
    const js = editor.getJs();

   const fullHtml = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LfooDa Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
${html}
<script src="script.js"><\/script>
</body>
</html>`;

    const zip = new JSZip();

    zip.file('index.html', fullHtml);
    zip.file('style.css', css);
    zip.file('script.js', js || '');

    zip.generateAsync({ type: 'blob' }).then((content) => {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(content);
      link.download = 'LfooDa-Website.zip';
      link.click();

      URL.revokeObjectURL(link.href);
    });
  },
});

      editor.BlockManager.add('testBlock', {
        label: 'Block',
        attributes: { class: 'gjs-fonts gjs-f-b1' },
        content: `<div style="padding-top:50px; padding-bottom:50px; text-align:center">Test block</div>`,
      });
    </script>
  </body>
</html>
